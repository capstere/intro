    "galLots As gallery.'BrowseLayout_Vertical_OneTextVariant_ver5.0'":
        BorderColor: =RGBA(220, 220, 220, 1)
        BorderThickness: =1
        DelayItemLoading: =true
        Height: =Parent.Height - 380
        Items: |
            =SortByColumns(
                              Filter(
                                  CM_Lots,
                                  PN = varCurrentMaterial.PN &&
                                  IsActive = "Yes"
                              ),
                              "ExpirationDate",
                              SortOrder.Ascending
                          )
        Layout: =Layout.Vertical
        LoadingSpinner: =LoadingSpinner.Data
        OnSelect: =Set(varSelectedLot, ThisItem)
        TemplateFill: |-
            =If(
            !IsBlank(varSelectedLot) && ThisItem.ID = varSelectedLot.ID,
            RGBA(230, 240, 255, 1),
            RGBA(255, 255, 255, 1)
            )
        TemplatePadding: =0
        TemplateSize: =80
        Width: =Parent.Width - 32
        X: =16
        Y: =272
        ZIndex: =35

