            PaddingLeft: =0
            PaddingRight: =0
            PaddingTop: =0
            Size: =14
            Text: =ThisItem.LotNumber
            VerticalAlign: =VerticalAlign.Top
            Width: =180
            X: =12
            Y: =8
            ZIndex: =3

