    btnSaveLot As button:
        Height: =70
        OnSelect: |-
            =With({_pn:varCurrentMaterial.PN,_lot:Upper(Trim(txtLotNumber.Text)),_qty:Value(txtQty.Text),_exp:dpExpirationDate.SelectedDate,_lotKey:varCurrentMaterial.PN&"|"&Upper(Trim(txtLotNumber.Text)),_source:Coalesce(varSource,"Manual"),_currentID:Coalesce(varSelectedLot.ID,-1)},If(IsBlank(_lot)||IsBlank(_exp)||!IsNumeric(txtQty.Text)||_qty<=0,Notify("Enter Lot Number, Expiration Date, and Qty greater than 0.",NotificationType.Error),If(ctxEditMode="Add",
            // === ADD MODE ===
            If(!IsBlank(LookUp(CM_Lots,LotKey=_lotKey&&IsActive="Yes")),Notify("This Lot Number already exists for this PN.",NotificationType.Error),IfError(Patch(CM_Lots,Defaults(CM_Lots),{Title:_pn,PN:_pn,LotNumber:_lot,LotKey:_lotKey,ExpirationDate:_exp,Qty:_qty,IsActive:"Yes",ChangedAt:Now(),ChangedByName:User().FullName,ChangedByEmail:User().Email});Patch(CM_Transactions,Defaults(CM_Transactions),{Title:_pn,PN:_pn,LotNumber:_lot,LotKey:_lotKey,ActionType:"Add",OldQty:Blank(),NewQty:_qty,OldExpirationDate:Blank(),NewExpirationDate:_exp,ChangedAt:Now(),ChangedByName:User().FullName,ChangedByEmail:User().Email,Reason:Blank(),Source:_source});Refresh(CM_Lots);Set(varSelectedLot,LookUp(CM_Lots,LotKey=_lotKey&&IsActive="Yes"));Reset(txtLotNumber);Reset(dpExpirationDate);Reset(txtQty);UpdateContext({ctxShowEdit: false ,ctxEditMode:Blank()});Notify("Lot added.",NotificationType.Success),Notify("Could not add the lot.",NotificationType.Error))),
            // === CHANGE MODE ===
            If(!IsBlank(LookUp(CM_Lots,LotKey=_lotKey&&IsActive="Yes"&&ID<>_currentID)),Notify("This Lot Number already exists for this PN.",NotificationType.Error),IfError(Patch(CM_Lots,varSelectedLot,{Title:_pn,PN:_pn,LotNumber:_lot,LotKey:_lotKey,ExpirationDate:_exp,Qty:_qty,ChangedAt:Now(),ChangedByName:User().FullName,ChangedByEmail:User().Email});Patch(CM_Transactions,Defaults(CM_Transactions),{Title:_pn,PN:_pn,LotNumber:_lot,LotKey:_lotKey,ActionType:"Change",OldQty:varSelectedLot.Qty,NewQty:_qty,OldExpirationDate:varSelectedLot.ExpirationDate,NewExpirationDate:_exp,ChangedAt:Now(),ChangedByName:User().FullName,ChangedByEmail:User().Email,Reason:Blank(),Source:_source});Refresh(CM_Lots);Set(varSelectedLot,LookUp(CM_Lots,LotKey=_lotKey&&IsActive="Yes"));Reset(txtLotNumber);Reset(dpExpirationDate);Reset(txtQty);UpdateContext({ctxShowEdit: false ,ctxEditMode:Blank()});Notify("Lot updated.",NotificationType.Success),Notify("Could not update the lot.",NotificationType.Error))))))
        Size: =24
        Text: ="Save"
        Visible: =ctxShowEdit
        Width: =100
        X: =Parent.Width - 144
        Y: =528
        ZIndex: =12

