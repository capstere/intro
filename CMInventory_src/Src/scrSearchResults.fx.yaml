scrSearchResults As screen:

    lblNoMaterials As label:
        Align: =Align.Center
        Height: =70
        Size: =21
        Text: ="No materials found."
        Visible: =CountRows(galMaterials.AllItems) = 0
        Width: =560
        X: =40
        Y: =435
        ZIndex: =1

    galMaterials As gallery.galleryVertical:
        DelayItemLoading: =true
        Items: |-
            =Filter(
                CM_PN_Master,
                IsActive = true &&
                (
                    StartsWith(PN, varSearchText) ||
                    StartsWith(BarcodePN, varSearchText) ||
                    StartsWith(MaterialName, varSearchText)
                )
            )
        Layout: =Layout.Vertical
        LoadingSpinner: =LoadingSpinner.Data
        OnSelect: |-
            =Set(varCurrentMaterial, ThisItem);
                          Set(varSelectedLot, Blank());
                          Navigate(scrLots, ScreenTransition.Fade)
        TemplateSize: =If(Self.Layout = Layout.Horizontal, Min(280, Self.Width - 60), Min(280, Self.Height - 60))
        Y: =183
        ZIndex: =2

        StorageLocation As label:
            Height: =70
            OnSelect: =Select(Parent)
            Size: =21
            Text: =ThisItem.StorageLocation
            Width: =560
            X: =40
            Y: =180
            ZIndex: =2

        MaterialName As label:
            Height: =70
            OnSelect: =Select(Parent)
            Size: =21
            Text: =ThisItem.MaterialName
            Width: =560
            X: =40
            Y: =110
            ZIndex: =3

        PN As label:
            Height: =70
            OnSelect: =Select(Parent)
            Size: =21
            Text: =ThisItem.PN
            Width: =560
            X: =40
            Y: =40
            ZIndex: =4

    lblSearchResults As label:
        Height: =70
        Size: =21
        Text: ="Select material"
        Width: =560
        X: =40
        Y: =40
        ZIndex: =3

    btnBackFromSearch As button:
        Height: =70
        OnSelect: =Navigate(scrHome, ScreenTransition.Fade)
        Size: =24
        Text: ="Back"
        Width: =280
        X: =78
        Y: =920
        ZIndex: =4

