App:
  Properties:
    OnError: =Notify(FirstError.Message, NotificationType.Error)
    OnStart: |+
      =Set(varSource, Blank());
      Set(varSearchText, Blank());
      Set(varCurrentMaterial, Blank());
      Set(varSelectedLot, Blank());
      Set(varMode, Blank())
    Theme: =PowerAppsTheme
