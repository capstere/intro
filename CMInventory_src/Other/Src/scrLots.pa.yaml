Screens:
  scrLots:
    Properties:
      Fill: =RGBA(248, 249, 250, 1)
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: |-
        =Refresh(CM_Lots);
        Set(varSelectedLot, Blank());
