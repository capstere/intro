Screens:
  scrSearchResults:
    Properties:
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
    Children:
      - lblNoMaterials:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Center
            BorderColor: =RGBA(0, 18, 107, 1)
            Font: =Font.'Open Sans'
            Text: ="No materials found."
            Visible: =CountRows(galMaterials.AllItems) = 0
            X: =40
            Y: =435
      - galMaterials:
          Control: Gallery@2.15.0
          Variant: Vertical
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Items: |-
              =Filter(
                  CM_PN_Master,
                  IsActive = true &&
                  (
                      StartsWith(PN, varSearchText) ||
                      StartsWith(BarcodePN, varSearchText) ||
                      StartsWith(MaterialName, varSearchText)
                  )
              )
            OnSelect: |-
              =Set(varCurrentMaterial, ThisItem);
                            Set(varSelectedLot, Blank());
                            Navigate(scrLots, ScreenTransition.Fade)
            Y: =183
          Children:
            - StorageLocation:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Font: =Font.'Open Sans'
                  OnSelect: =Select(Parent)
                  Text: =ThisItem.StorageLocation
                  X: =40
                  Y: =180
            - MaterialName:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Font: =Font.'Open Sans'
                  OnSelect: =Select(Parent)
                  Text: =ThisItem.MaterialName
                  X: =40
                  Y: =110
            - PN:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Font: =Font.'Open Sans'
                  OnSelect: =Select(Parent)
                  Text: =ThisItem.PN
                  X: =40
                  Y: =40
      - lblSearchResults:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Font: =Font.'Open Sans'
            Text: ="Select material"
            X: =40
            Y: =40
      - btnBackFromSearch:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =ColorFade(Self.Fill, -15%)
            Color: =RGBA(255, 255, 255, 1)
            DisabledBorderColor: =RGBA(166, 166, 166, 1)
            Fill: =RGBA(56, 96, 178, 1)
            Font: =Font.'Open Sans'
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =RGBA(255, 255, 255, 1)
            HoverFill: =ColorFade(RGBA(56, 96, 178, 1), -20%)
            OnSelect: =Navigate(scrHome, ScreenTransition.Fade)
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =Self.Color
            Text: ="Back"
            X: =78
            Y: =920
